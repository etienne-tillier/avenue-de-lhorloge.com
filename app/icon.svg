<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond cadran crème -->
  <circle cx="32" cy="32" r="31" fill="#1A2B4A" stroke="#C4966A" stroke-width="2"/>
  <!-- Cadran intérieur -->
  <circle cx="32" cy="32" r="25" fill="#F9F5EE" stroke="#C4966A" stroke-width="1"/>
  <!-- Marques des heures -->
  <rect x="31" y="8" width="2" height="5" rx="1" fill="#C4966A"/>
  <rect x="31" y="51" width="2" height="5" rx="1" fill="#C4966A"/>
  <rect x="8" y="31" width="5" height="2" rx="1" fill="#C4966A"/>
  <rect x="51" y="31" width="5" height="2" rx="1" fill="#C4966A"/>
  <!-- Aiguilles -->
  <!-- Aiguille des minutes (pointant vers 12h) -->
  <line x1="32" y1="32" x2="32" y2="12" stroke="#1A2B4A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Aiguille des heures (pointant vers 10h) -->
  <line x1="32" y1="32" x2="18" y2="18" stroke="#1A2B4A" stroke-width="3" stroke-linecap="round"/>
  <!-- Aiguille des secondes -->
  <line x1="32" y1="32" x2="44" y2="38" stroke="#C4966A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="32" cy="32" r="3" fill="#C4966A"/>
</svg>
